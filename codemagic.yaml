workflows:
  ios:
    name: ios-build-no-signing
    max_build_duration: 120
    environment:
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          ./gradlew clean build
      - name: Build iOS App (No Code Signing)
        script: |
          cd iosApp # Перейдите в директорию iOS
          xcodebuild -project iosApp.xcodeproj -scheme YourScheme -configuration Release -destination generic/platform=iOS clean build CODE_SIGNING_REQUIRED=NO
    artifacts:
      - build/ios/iphoneos/*.ipa # Убедитесь, что путь к артефактам правильный
