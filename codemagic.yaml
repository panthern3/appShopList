workflows:
  ios:
    name: ios-build-no-signing
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: stable
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
          pod install
      - name: Build iOS App (No Code Signing)
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
