workflows:
  ios:
    name: ios-build-no-signing
    max_build_duration: 120
    environment:
      cocoapods: 1.16.1
      xcode: latest
    scripts:
      - name: Install CocoaPods dependencies
        script: |
          cd iosApp # Перейдите в директорию iOS, если она существует
          pod install
      - name: Build iOS App (No Code Signing)
        script: |
          cd iosApp # Перейдите в директорию iOS
          xcodebuild -workspace YourWorkspace.xcworkspace -scheme YourScheme -configuration Release -destination 'generic/platform=iOS' clean build CODE_SIGNING_REQUIRED=NO
    artifacts:
      - build/ios/iphoneos/*.ipa # Убедитесь, что путь к артефактам правильный
